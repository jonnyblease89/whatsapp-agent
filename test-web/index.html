<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CH Autoworks — AI Staging</title>
  <link rel="stylesheet" href="/inbox/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="chat-screen" class="screen">
    <header>
      <div class="header-info">
        <div class="name">AI Staging</div>
      </div>
    </header>

    <div class="test-banner">🧪 Test only — not sent to real customers or Ian's inbox. Conversation lasts as long as this tab is open — refresh to start over.</div>

    <div id="messages">
      <div class="empty">Type a message below as if you were a customer texting CH Autoworks.</div>
    </div>

    <div id="reply-bar">
      <textarea id="reply-input" placeholder="Type a message…" rows="1"></textarea>
      <button id="send-btn">&#10148;</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
